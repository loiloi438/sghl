services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sghl
      POSTGRES_USER: sghl
      POSTGRES_PASSWORD: sghl
    ports:
      - "5432:5432"
    volumes:
      - sghl_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sghl -d sghl']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,api
      DB_ENGINE: postgresql
      DB_NAME: sghl
      DB_USER: sghl
      DB_PASSWORD: sghl
      DB_HOST: db
      DB_PORT: "5432"
      # Seeds désactivés par défaut — activer uniquement en dev local :
      SGHL_SEED_ADMIN: ${SGHL_SEED_ADMIN:-false}
      SGHL_SEED_DEMO: ${SGHL_SEED_DEMO:-false}
      SGHL_ADMIN_PASSWORD: ${SGHL_ADMIN_PASSWORD:-}
    volumes:
      - sghl_media:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  sghl_pg_data:
  sghl_media:
