<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Application mobile patient SGHL">
  <meta name="sghl-api-base" content="https://sghl-api.onrender.com/api/v1">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="sghl_mobile">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>SGHL Patient — Human-Care</title>
  <link rel="manifest" href="manifest.json">
  <script>
    (function () {
      var host = window.location.hostname || '';
      if (host && host !== 'localhost' && host !== '127.0.0.1') {
        try {
          var raw = localStorage.getItem('flutter.shared_preferences');
          if (raw) {
            var data = JSON.parse(raw);
            if (data && typeof data === 'object' && data.sghl_api_base_url) {
              delete data.sghl_api_base_url;
              localStorage.setItem('flutter.shared_preferences', JSON.stringify(data));
            }
          }
        } catch (e) {}
      }
    })();
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
