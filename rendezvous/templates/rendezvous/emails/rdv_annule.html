<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <title>Rendez-vous annulé</title>
</head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #1e293b;">
  <p>Bonjour <strong>{{ patient_nom }}</strong>,</p>
  <p>Votre rendez-vous du <strong>{{ date_heure }}</strong> avec Dr {{ medecin_nom }} à <strong>{{ etablissement }}</strong> a été <strong style="color: #dc2626;">annulé</strong>.</p>
  <p><strong>Motif :</strong> {{ motif_annulation }}</p>
  <p>N° dossier : {{ numero_dossier }}</p>
  <p>Pour replanifier un créneau, contactez l'accueil ou utilisez votre espace patient.</p>
  <p style="color: #64748b; font-size: 0.9rem;">{{ etablissement }}</p>
</body>
</html>
