<!DOCTYPE html>
<html lang="fr">
<head><meta charset="utf-8"><title>Rendez-vous reporté</title></head>
<body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #1e293b;">
  <p>Bonjour <strong>{{ patient_nom }}</strong>,</p>
  <p>Votre rendez-vous à <strong>{{ etablissement }}</strong> a été <strong style="color: #d97706;">reporté</strong>.</p>
  <table style="border-collapse: collapse; margin: 1rem 0;">
    <tr><td style="padding: 4px 12px 4px 0;">Ancienne date</td><td><s>{{ ancienne_date_heure }}</s></td></tr>
    <tr><td style="padding: 4px 12px 4px 0;">Nouvelle date</td><td><strong>{{ date_heure }}</strong></td></tr>
    <tr><td style="padding: 4px 12px 4px 0;">Médecin</td><td>Dr {{ medecin_nom }}</td></tr>
    <tr><td style="padding: 4px 12px 4px 0;">Motif</td><td>{{ motif }}</td></tr>
  </table>
  {% if motif_modification %}<p><em>Motif :</em> {{ motif_modification }}</p>{% endif %}
  <p style="color: #64748b; font-size: 0.9rem;">{{ etablissement }}</p>
</body>
</html>
