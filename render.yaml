# Blueprint Render — SGHL (API + PostgreSQL + frontend statique)
# Render Dashboard → New → Blueprint → repo loiloi438/sghl
# Renseigner SGHL_ADMIN_PASSWORD avant le premier déploiement.

databases:
  - name: sghl-db
    plan: free
    databaseName: sghl
    user: sghl
    # PostgreSQL 16 managé — migrations auto au boot via deploy/docker-entrypoint.sh

services:
  - type: web
    name: sghl-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: PDF_SIGNING_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sghl-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sghl-staff.onrender.com
      - key: SGHL_FRONTEND_URL
        value: https://sghl-staff.onrender.com
      - key: DB_ENGINE
        value: postgresql
      - key: DATABASE_URL
        fromDatabase:
          name: sghl-db
          property: connectionString
      - key: OTP_MODE
        value: development
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: SGHL_SEED_ADMIN
        value: "true"
      - key: SGHL_SEED_DEMO
        value: "true"
      - key: SGHL_ADMIN_USERNAME
        value: admin
      - key: SGHL_ADMIN_PASSWORD
        sync: false

  - type: web
    name: sghl-staff
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sghl-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
