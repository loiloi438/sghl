# Blueprint Render — SGHL
# Dashboard Render → New → Blueprint → connecter loiloi438/sghl
# Puis renseigner SGHL_ADMIN_PASSWORD dans l'API avant le premier déploiement.

databases:
  - name: sghl-db
    plan: free
    databaseName: sghl
    user: sghl

services:
  - type: web
    name: sghl-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz/
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: PDF_SIGNING_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: sghl-api.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://sghl-staff.onrender.com
      - key: SGHL_FRONTEND_URL
        value: https://sghl-staff.onrender.com
      - key: DB_ENGINE
        value: postgresql
      - key: DB_HOST
        fromDatabase:
          name: sghl-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: sghl-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: sghl-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: sghl-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: sghl-db
          property: password
      - key: OTP_MODE
        value: development
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend
      - key: SGHL_SEED_ADMIN
        value: "true"
      - key: SGHL_SEED_DEMO
        value: "true"
      - key: SGHL_ADMIN_USERNAME
        value: admin
      - key: SGHL_ADMIN_PASSWORD
        sync: false

  - type: web
    name: sghl-staff
    runtime: static
    plan: free
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://sghl-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
